# Publishes the package to npm when a GitHub Release is published.
# Bump the version in package.json, then create a Release (or push a tag and
# publish a release from it) to trigger this workflow.
# Installs deps first so the `prepublishOnly` expo-module build can run.
name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: yarn install --frozen-lockfile
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm_token }}
